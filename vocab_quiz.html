<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Music Vocab Quiz</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 12px;
}
/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid #333;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-btn {
  background: none;
  border: none;
  color: #999;
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active {
  color: #4a9eff;
  border-bottom-color: #4a9eff;
}
.tab-btn:hover { color: #e0e0e0; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Cards & panels */
.card {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.card h3 {
  margin-bottom: 12px;
  color: #4a9eff;
  font-size: 16px;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s;
  color: #fff;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: #4a9eff; }
.btn-success { background: #4caf50; }
.btn-danger { background: #f44336; }
.btn-secondary { background: #555; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn + .btn { margin-left: 8px; }

/* Forms */
select, input[type="text"], input[type="number"] {
  background: #111;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 14px;
  width: 100%;
}
select:focus, input:focus { outline: none; border-color: #4a9eff; }
label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; }
.form-group { margin-bottom: 12px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 500px) {
  .form-row { grid-template-columns: 1fr; }
}

/* Tables */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th, td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid #222;
}
th { color: #888; font-weight: 600; font-size: 12px; }
td { color: #ddd; }
tr:hover td { background: #1a1a2e; }

/* Status dots */
.dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
}
.dot-green { background: #4caf50; }
.dot-yellow { background: #ffc107; }
.dot-red { background: #f44336; }
.dot-gray { background: #666; }

/* Speaker icon */
.speak-btn {
  background: none;
  border: none;
  color: #4a9eff;
  cursor: pointer;
  font-size: 16px;
  padding: 2px 4px;
  vertical-align: middle;
}
.speak-btn:hover { color: #7bb8ff; }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
.stat-box {
  background: #111;
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.stat-box .num { font-size: 24px; font-weight: bold; color: #4a9eff; }
.stat-box .label { font-size: 11px; color: #888; margin-top: 4px; }

/* Song list */
.song-item {
  padding: 8px 0;
  border-bottom: 1px solid #1a1a2e;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}
.song-item:last-child { border-bottom: none; }
.song-item .count { color: #888; }

/* Quiz */
.quiz-word {
  font-size: 36px;
  font-weight: bold;
  text-align: center;
  padding: 24px 0 8px;
  color: #fff;
}
.quiz-lyric {
  text-align: center;
  color: #999;
  font-size: 14px;
  margin-bottom: 24px;
  font-style: italic;
}
.quiz-lyric b { color: #4a9eff; font-style: normal; }
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 500px;
  margin: 0 auto;
}
@media (max-width: 400px) {
  .choices { grid-template-columns: 1fr; }
}
.choice-btn {
  background: #1a1a2e;
  border: 2px solid #333;
  border-radius: 12px;
  color: #e0e0e0;
  padding: 16px;
  font-size: 16px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.3s;
  text-align: center;
}
.choice-btn:hover { border-color: #4a9eff; }
.choice-btn.correct { background: #1b3a1b; border-color: #4caf50; }
.choice-btn.wrong { background: #3a1b1b; border-color: #f44336; }
.choice-btn.reveal { border-color: #4caf50; background: #1b3a1b; }

.progress-bar {
  height: 4px;
  background: #222;
  border-radius: 2px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: #4a9eff;
  transition: width 0.3s;
}
.progress-text {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-bottom: 16px;
}

/* Result */
.result-score {
  text-align: center;
  font-size: 48px;
  font-weight: bold;
  color: #4a9eff;
  padding: 20px 0 8px;
}
.result-pct {
  text-align: center;
  font-size: 18px;
  color: #888;
  margin-bottom: 20px;
}

/* Inline edit */
.editable {
  cursor: pointer;
  border-bottom: 1px dashed #555;
}
.editable:hover { color: #4a9eff; }
.inline-input {
  background: #111;
  border: 1px solid #4a9eff;
  color: #e0e0e0;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  width: 100%;
}

/* Hidden file input */
.hidden-input { display: none; }

/* Scrollable */
.scroll-table { max-height: 60vh; overflow-y: auto; }

/* Tag */
.tag {
  display: inline-block;
  background: #222;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  color: #aaa;
  margin: 1px;
}

/* Message */
.msg {
  text-align: center;
  color: #888;
  padding: 40px 20px;
  font-size: 14px;
}

/* Breakdown */
.breakdown {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.breakdown-item {
  background: #111;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
}
.breakdown-item .bk-count { color: #4a9eff; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="data">データ管理</button>
    <button class="tab-btn" data-tab="list">単語一覧</button>
    <button class="tab-btn" data-tab="quiz">クイズ</button>
    <button class="tab-btn" data-tab="history">学習履歴</button>
  </div>

  <!-- Tab 1: データ管理 -->
  <div id="tab-data" class="tab-content active">
    <div class="card">
      <h3>インポート / エクスポート</h3>
      <input type="file" id="importFile" accept=".json" class="hidden-input">
      <button class="btn btn-primary" onclick="document.getElementById('importFile').click()">JSONインポート</button>
      <button class="btn btn-secondary" onclick="exportJSON()">JSONエクスポート</button>
      <button class="btn btn-danger" onclick="clearAllData()">データ消去</button>
    </div>
    <div class="card">
      <h3>統計</h3>
      <div class="stats-grid" id="dataStats"></div>
      <div style="margin-top:12px">
        <h3>品詞別</h3>
        <div class="breakdown" id="posBreakdown"></div>
      </div>
      <div style="margin-top:12px">
        <h3>ジャンル別</h3>
        <div class="breakdown" id="genreBreakdown"></div>
      </div>
    </div>
    <div class="card">
      <h3>曲リスト</h3>
      <div id="songList"></div>
    </div>
  </div>

  <!-- Tab 2: 単語一覧 -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label>アーティスト</label>
          <select id="filterArtist"><option value="">すべて</option></select>
        </div>
        <div class="form-group">
          <label>曲名</label>
          <select id="filterSong"><option value="">すべて</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>品詞</label>
          <select id="filterPOS"><option value="">すべて</option></select>
        </div>
        <div class="form-group">
          <label>ジャンル</label>
          <select id="filterGenre"><option value="">すべて</option></select>
        </div>
      </div>
      <div class="form-group">
        <label>検索</label>
        <input type="text" id="filterText" placeholder="単語を検索...">
      </div>
    </div>
    <div class="card">
      <div id="wordCount" style="font-size:12px;color:#888;margin-bottom:8px;"></div>
      <div class="scroll-table table-wrap">
        <table>
          <thead>
            <tr>
              <th>単語</th>
              <th>意味</th>
              <th>品詞</th>
              <th>ジャンル</th>
              <th>曲</th>
              <th>状態</th>
            </tr>
          </thead>
          <tbody id="wordTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab 3: クイズ -->
  <div id="tab-quiz" class="tab-content">
    <div id="quizConfig">
      <div class="card">
        <h3>クイズ設定</h3>
        <div class="form-row">
          <div class="form-group">
            <label>問題数</label>
            <select id="quizCount">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="30">30</option>
            </select>
          </div>
          <div class="form-group">
            <label>モード</label>
            <select id="quizMode">
              <option value="en2jp">EN → JP</option>
              <option value="jp2en">JP → EN</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>アーティスト</label>
            <select id="qFilterArtist"><option value="">すべて</option></select>
          </div>
          <div class="form-group">
            <label>曲名</label>
            <select id="qFilterSong"><option value="">すべて</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>品詞</label>
            <select id="qFilterPOS"><option value="">すべて</option></select>
          </div>
          <div class="form-group">
            <label>ジャンル</label>
            <select id="qFilterGenre"><option value="">すべて</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>優先度</label>
          <select id="quizPriority">
            <option value="random">ランダム</option>
            <option value="weak">苦手優先</option>
            <option value="new">新規優先</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;margin-top:8px;">クイズ開始</button>
      </div>
    </div>
    <div id="quizArea" style="display:none;"></div>
    <div id="quizResult" style="display:none;"></div>
  </div>

  <!-- Tab 4: 学習履歴 -->
  <div id="tab-history" class="tab-content">
    <div class="card">
      <h3>学習統計</h3>
      <div class="stats-grid" id="historyStats"></div>
    </div>
    <div class="card">
      <h3>苦手単語</h3>
      <button class="btn btn-primary btn-sm" onclick="startWeakQuiz()" style="margin-bottom:12px;">間違えた単語だけ復習</button>
      <div class="scroll-table table-wrap">
        <table>
          <thead>
            <tr>
              <th>単語</th>
              <th>意味</th>
              <th>回数</th>
              <th>正答率</th>
              <th>最終</th>
            </tr>
          </thead>
          <tbody id="weakTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// === Constants ===
const POS_JA = {noun:'名詞',verb:'動詞',adjective:'形容詞',adverb:'副詞',preposition:'前置詞',conjunction:'接続詞',pronoun:'代名詞',interjection:'間投詞',phrase:'フレーズ'};
const GENRE_JA = {daily_life:'日常',emotion:'感情',nature:'自然',abstract:'抽象',body:'身体',time:'時間',social:'社会',academic:'学術',slang:'スラング'};
const LS_DATA = 'musicVocab_masterData';
const LS_HISTORY = 'musicVocab_quizHistory';
const LS_SETTINGS = 'musicVocab_settings';

// === Data helpers ===
function getData() {
  try { return JSON.parse(localStorage.getItem(LS_DATA)) || {songs:[], words:[]}; }
  catch(e) { return {songs:[], words:[]}; }
}
function setData(d) { localStorage.setItem(LS_DATA, JSON.stringify(d)); }
function getHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY)) || {attempts:[]}; }
  catch(e) { return {attempts:[]}; }
}
function setHistory(h) { localStorage.setItem(LS_HISTORY, JSON.stringify(h)); }
function getSettings() {
  try { return JSON.parse(localStorage.getItem(LS_SETTINGS)) || {}; }
  catch(e) { return {}; }
}
function setSettings(s) { localStorage.setItem(LS_SETTINGS, JSON.stringify(s)); }

// === Tab switching ===
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    saveAllPending();
    refreshTab(btn.dataset.tab);
  });
});

function saveAllPending() {
  // Any pending inline edits saved on blur, nothing extra needed
}

function refreshTab(tab) {
  if (tab === 'data') renderDataTab();
  else if (tab === 'list') renderListTab();
  else if (tab === 'quiz') renderQuizConfig();
  else if (tab === 'history') renderHistoryTab();
}

// === Import ===
document.getElementById('importFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      mergeData(imported);
      renderDataTab();
      alert('インポート完了');
    } catch(err) {
      alert('JSONの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
  this.value = '';
});

function mergeData(imported) {
  const data = getData();
  // Merge songs
  if (imported.songs) {
    for (const song of imported.songs) {
      const exists = data.songs.find(s => s.id === song.id);
      if (!exists) data.songs.push(song);
    }
  }
  // Merge vocabulary
  if (imported.words) {
    for (const word of imported.words) {
      const exists = data.words.find(w => w.id === word.id);
      if (exists) {
        // Merge song_ids
        if (word.songs) {
          for (const sid of word.songs) {
            if (!exists.songs.includes(sid)) exists.songs.push(sid);
          }
        }
      } else {
        data.words.push(word);
      }
    }
  }
  setData(data);
}

// === Export ===
function exportJSON() {
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vocab_data.json';
  a.click();
  URL.revokeObjectURL(url);
}

// === Clear ===
function clearAllData() {
  if (!confirm('すべてのデータを消去しますか？この操作は元に戻せません。')) return;
  if (!confirm('本当に消去しますか？')) return;
  localStorage.removeItem(LS_DATA);
  localStorage.removeItem(LS_HISTORY);
  localStorage.removeItem(LS_SETTINGS);
  renderDataTab();
  alert('データを消去しました');
}

// === Speech ===
function speakWord(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// === Word stats ===
function getWordStats(wordId, history) {
  const attempts = (history || getHistory()).attempts.filter(a => a.wordId === wordId);
  const total = attempts.length;
  const correct = attempts.filter(a => a.correct).length;
  let streak = 0;
  for (let i = attempts.length - 1; i >= 0; i--) {
    if (attempts[i].correct) streak++; else break;
  }
  const lastDate = attempts.length > 0 ? Math.max(...attempts.map(a => a.timestamp)) : null;
  return { total, correct, streak, lastDate };
}

function getWordStatus(wordId) {
  const stats = getWordStats(wordId);
  if (stats.total === 0) return 'gray';
  if (stats.streak >= 3) return 'green';
  const acc = stats.correct / stats.total;
  if (acc >= 0.6) return 'yellow';
  return 'red';
}

// === Priority score ===
function priorityScore(word, history) {
  const stats = getWordStats(word.id, history);
  const accuracy = stats.total > 0 ? stats.correct / stats.total : 0;
  const daysSince = stats.lastDate ? (Date.now() - stats.lastDate) / 86400000 : 30;
  return (1 - accuracy) * 3 + daysSince / 7 + (stats.total === 0 ? 2 : 0) - stats.streak * 0.5;
}

// === Distractor algorithm ===
function pickRandom(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function generateDistractors(target, allWords) {
  const candidates = allWords.filter(w => w.id !== target.id);
  const samePOS = candidates.filter(w => w.pos === target.pos);
  const sameGenre = samePOS.filter(w => w.genre === target.genre);
  let distractors = [];
  distractors.push(...pickRandom(sameGenre, 2));
  const remaining = samePOS.filter(w => !distractors.find(d => d.id === w.id));
  distractors.push(...pickRandom(remaining, 3 - distractors.length));
  if (distractors.length < 3) {
    const fallback = candidates.filter(w => !distractors.find(d => d.id === w.id));
    distractors.push(...pickRandom(fallback, 3 - distractors.length));
  }
  return distractors.slice(0, 3);
}

// ==================
// Tab 1: データ管理
// ==================
function renderDataTab() {
  const data = getData();
  const vocab = data.words || [];
  const songs = data.songs || [];

  // Stats
  const statsEl = document.getElementById('dataStats');
  statsEl.innerHTML = `
    <div class="stat-box"><div class="num">${vocab.length}</div><div class="label">単語数</div></div>
    <div class="stat-box"><div class="num">${songs.length}</div><div class="label">曲数</div></div>
    <div class="stat-box"><div class="num">${[...new Set(songs.map(s=>s.artist))].length}</div><div class="label">アーティスト</div></div>
  `;

  // POS breakdown
  const posCounts = {};
  vocab.forEach(w => { posCounts[w.pos] = (posCounts[w.pos]||0) + 1; });
  document.getElementById('posBreakdown').innerHTML = Object.entries(posCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div class="breakdown-item">${POS_JA[k]||k} <span class="bk-count">${v}</span></div>`)
    .join('');

  // Genre breakdown
  const genreCounts = {};
  vocab.forEach(w => { genreCounts[w.genre] = (genreCounts[w.genre]||0) + 1; });
  document.getElementById('genreBreakdown').innerHTML = Object.entries(genreCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div class="breakdown-item">${GENRE_JA[k]||k} <span class="bk-count">${v}</span></div>`)
    .join('');

  // Song list
  const songListEl = document.getElementById('songList');
  if (songs.length === 0) {
    songListEl.innerHTML = '<div class="msg">曲データがありません</div>';
  } else {
    songListEl.innerHTML = songs.map(s => {
      const wc = vocab.filter(w => w.songs && w.songs.includes(s.id)).length;
      return `<div class="song-item"><span>${s.artist} - ${s.title}</span><span class="count">${wc}語</span></div>`;
    }).join('');
  }
}

// ==================
// Tab 2: 単語一覧
// ==================
function populateFilterDropdowns() {
  const data = getData();
  const songs = data.songs || [];
  const artists = [...new Set(songs.map(s => s.artist))].sort();

  // List tab filters
  populateArtistSelect('filterArtist', artists);
  populateSongSelect('filterSong', songs, '');
  populatePOSSelect('filterPOS');
  populateGenreSelect('filterGenre');

  // Quiz tab filters
  populateArtistSelect('qFilterArtist', artists);
  populateSongSelect('qFilterSong', songs, '');
  populatePOSSelect('qFilterPOS');
  populateGenreSelect('qFilterGenre');
}

function populateArtistSelect(id, artists) {
  const sel = document.getElementById(id);
  const val = sel.value;
  sel.innerHTML = '<option value="">すべて</option>' + artists.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');
  sel.value = val;
}

function populateSongSelect(id, songs, artist) {
  const sel = document.getElementById(id);
  const filtered = artist ? songs.filter(s => s.artist === artist) : songs;
  sel.innerHTML = '<option value="">すべて</option>' + filtered.map(s => `<option value="${esc(s.id)}">${esc(s.title)}</option>`).join('');
}

function populatePOSSelect(id) {
  const sel = document.getElementById(id);
  if (sel.options.length > 1) return;
  sel.innerHTML = '<option value="">すべて</option>' + Object.entries(POS_JA).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
}

function populateGenreSelect(id) {
  const sel = document.getElementById(id);
  if (sel.options.length > 1) return;
  sel.innerHTML = '<option value="">すべて</option>' + Object.entries(GENRE_JA).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Artist -> Song cascade
document.getElementById('filterArtist').addEventListener('change', function() {
  const data = getData();
  populateSongSelect('filterSong', data.songs||[], this.value);
  renderWordTable();
});
document.getElementById('qFilterArtist').addEventListener('change', function() {
  const data = getData();
  populateSongSelect('qFilterSong', data.songs||[], this.value);
});

['filterSong','filterPOS','filterGenre'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderWordTable);
});
document.getElementById('filterText').addEventListener('input', renderWordTable);

function getFilteredWords() {
  const data = getData();
  const vocab = data.words || [];
  const songs = data.songs || [];
  const artist = document.getElementById('filterArtist').value;
  const songId = document.getElementById('filterSong').value;
  const pos = document.getElementById('filterPOS').value;
  const genre = document.getElementById('filterGenre').value;
  const text = document.getElementById('filterText').value.toLowerCase();

  let filtered = vocab;
  if (artist) {
    const artistSongIds = songs.filter(s => s.artist === artist).map(s => s.id);
    filtered = filtered.filter(w => w.songs && w.songs.some(sid => artistSongIds.includes(sid)));
  }
  if (songId) {
    filtered = filtered.filter(w => w.songs && w.songs.includes(songId));
  }
  if (pos) filtered = filtered.filter(w => w.pos === pos);
  if (genre) filtered = filtered.filter(w => w.genre === genre);
  if (text) filtered = filtered.filter(w => w.word.toLowerCase().includes(text) || (w.meaning_ja && w.meaning_ja.includes(text)));
  return filtered;
}

function renderWordTable() {
  const data = getData();
  const songs = data.songs || [];
  const filtered = getFilteredWords();
  document.getElementById('wordCount').textContent = `${filtered.length} 件表示`;

  const tbody = document.getElementById('wordTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:20px;">単語がありません</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(w => {
    const status = getWordStatus(w.id);
    const songNames = (w.songs || []).map(sid => {
      const s = songs.find(x => x.id === sid);
      return s ? s.title : sid;
    });
    return `<tr>
      <td><button class="speak-btn" onclick="speakWord('${esc(w.word)}')" title="発音">&#128264;</button> ${esc(w.word)}</td>
      <td class="editable" data-word-id="${esc(w.id)}" onclick="startInlineEdit(this)">${esc(w.meaning_ja||'')}</td>
      <td><span class="tag">${POS_JA[w.pos]||w.pos}</span></td>
      <td><span class="tag">${GENRE_JA[w.genre]||w.genre}</span></td>
      <td style="font-size:11px;">${songNames.map(n => esc(n)).join(', ')}</td>
      <td><span class="dot dot-${status}" title="${status}"></span></td>
    </tr>`;
  }).join('');
}

function startInlineEdit(td) {
  if (td.querySelector('input')) return;
  const wordId = td.dataset.wordId;
  const current = td.textContent;
  td.innerHTML = `<input class="inline-input" value="${esc(current)}" onblur="finishInlineEdit(this, '${esc(wordId)}')" onkeydown="if(event.key==='Enter')this.blur()">`;
  td.querySelector('input').focus();
}

function finishInlineEdit(input, wordId) {
  const newVal = input.value;
  const data = getData();
  const word = data.words.find(w => w.id === wordId);
  if (word) {
    word.meaning_ja = newVal;
    setData(data);
  }
  const td = input.parentElement;
  td.textContent = newVal;
}

function renderListTab() {
  populateFilterDropdowns();
  renderWordTable();
}

// ==================
// Tab 3: クイズ
// ==================
let quizState = null;

function renderQuizConfig() {
  document.getElementById('quizConfig').style.display = '';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
  populateFilterDropdowns();
}

function getQuizFilteredWords() {
  const data = getData();
  const vocab = data.words || [];
  const songs = data.songs || [];
  const artist = document.getElementById('qFilterArtist').value;
  const songId = document.getElementById('qFilterSong').value;
  const pos = document.getElementById('qFilterPOS').value;
  const genre = document.getElementById('qFilterGenre').value;

  let filtered = vocab;
  if (artist) {
    const artistSongIds = songs.filter(s => s.artist === artist).map(s => s.id);
    filtered = filtered.filter(w => w.songs && w.songs.some(sid => artistSongIds.includes(sid)));
  }
  if (songId) filtered = filtered.filter(w => w.songs && w.songs.includes(songId));
  if (pos) filtered = filtered.filter(w => w.pos === pos);
  if (genre) filtered = filtered.filter(w => w.genre === genre);
  return filtered;
}

function startQuiz(overrideWords) {
  const data = getData();
  const allVocab = data.words || [];
  const count = parseInt(document.getElementById('quizCount').value);
  const mode = document.getElementById('quizMode').value;
  const priority = document.getElementById('quizPriority').value;
  const pool = overrideWords || getQuizFilteredWords();

  if (allVocab.length < 4) {
    alert('クイズには4単語以上必要です');
    return;
  }
  if (pool.length < 4) {
    alert('フィルター条件に合う単語が4つ未満です。条件を広げてください。');
    return;
  }

  let selected;
  const history = getHistory();
  if (priority === 'weak') {
    selected = [...pool].sort((a,b) => priorityScore(b, history) - priorityScore(a, history));
  } else if (priority === 'new') {
    selected = [...pool].sort((a,b) => {
      const aTotal = getWordStats(a.id, history).total;
      const bTotal = getWordStats(b.id, history).total;
      if (aTotal === 0 && bTotal > 0) return -1;
      if (bTotal === 0 && aTotal > 0) return 1;
      return Math.random() - 0.5;
    });
  } else {
    selected = [...pool].sort(() => Math.random() - 0.5);
  }
  selected = selected.slice(0, count);

  quizState = {
    questions: selected,
    allWords: allVocab,
    mode: mode,
    current: 0,
    answers: [],
    songs: data.songs || []
  };

  document.getElementById('quizConfig').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizArea').style.display = '';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (!quizState || quizState.current >= quizState.questions.length) {
    showQuizResult();
    return;
  }
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const idx = quizState.current;
  const mode = quizState.mode;

  const distractors = generateDistractors(q, quizState.allWords);
  const options = [...distractors, q].sort(() => Math.random() - 0.5);

  const prompt = mode === 'en2jp' ? q.word : (q.meaning_ja || '---');
  const getAnswer = (w) => mode === 'en2jp' ? (w.meaning_ja || '---') : w.word;
  const correctAnswer = getAnswer(q);

  // Find a lyric line
  let lyricLine = '';
  if (q.example_lyrics && q.example_lyrics.length > 0) {
    lyricLine = q.example_lyrics[0];
  } else if (q.songs && q.songs.length > 0) {
    const song = quizState.songs.find(s => s.id === q.songs[0]);
    if (song && song.lyrics) {
      const lines = song.lyrics.split('\n');
      const match = lines.find(l => l.toLowerCase().includes(q.word.toLowerCase()));
      if (match) lyricLine = match;
    }
  }

  // Highlight word in lyric
  let lyricHTML = '';
  if (lyricLine) {
    const re = new RegExp('(' + q.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    lyricHTML = esc(lyricLine).replace(re, '<b>$1</b>');
  }

  const pct = ((idx) / total * 100).toFixed(0);
  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
    <div class="progress-text">${idx + 1} / ${total}</div>
    <div class="quiz-word">
      <button class="speak-btn" onclick="speakWord('${esc(q.word)}')" style="font-size:24px;" title="発音">&#128264;</button>
      ${esc(prompt)}
    </div>
    ${lyricHTML ? `<div class="quiz-lyric">${lyricHTML}</div>` : ''}
    <div class="choices" id="quizChoices">
      ${options.map((o, i) => `<button class="choice-btn" data-word-id="${esc(o.id)}" data-answer="${esc(getAnswer(o))}" onclick="selectAnswer(this, '${esc(q.id)}')">${esc(getAnswer(o))}</button>`).join('')}
    </div>
  `;
}

function selectAnswer(btn, correctWordId) {
  if (btn.parentElement.dataset.answered) return;
  btn.parentElement.dataset.answered = 'true';

  const q = quizState.questions[quizState.current];
  const selectedWordId = btn.dataset.wordId;
  const isCorrect = selectedWordId === correctWordId;

  // Record
  const history = getHistory();
  history.attempts.push({
    wordId: q.id,
    correct: isCorrect,
    chosenAnswer: btn.dataset.answer,
    timestamp: Date.now()
  });
  setHistory(history);
  quizState.answers.push({ word: q, correct: isCorrect, chosen: btn.dataset.answer });

  // Visual feedback
  if (isCorrect) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    // Reveal correct
    const buttons = btn.parentElement.querySelectorAll('.choice-btn');
    buttons.forEach(b => {
      if (b.dataset.wordId === correctWordId) b.classList.add('reveal');
    });
  }

  // Disable all buttons
  btn.parentElement.querySelectorAll('.choice-btn').forEach(b => {
    b.style.pointerEvents = 'none';
  });

  // Auto-advance
  const advanceTimer = setTimeout(() => advance(), 1500);
  // Also allow click to advance
  document.getElementById('quizArea').addEventListener('click', function handler(e) {
    if (e.target.closest('.choice-btn')) return;
    clearTimeout(advanceTimer);
    document.getElementById('quizArea').removeEventListener('click', handler);
    advance();
  }, { once: false });

  function advance() {
    quizState.current++;
    renderQuizQuestion();
  }
}

function showQuizResult() {
  document.getElementById('quizArea').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.style.display = '';

  const total = quizState.answers.length;
  const correct = quizState.answers.filter(a => a.correct).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const wrong = quizState.answers.filter(a => !a.correct);

  let wrongHTML = '';
  if (wrong.length > 0) {
    wrongHTML = `<div class="card"><h3>間違えた単語</h3><table>
      <thead><tr><th>単語</th><th>正解</th><th>あなたの回答</th></tr></thead>
      <tbody>${wrong.map(a => `<tr>
        <td>${esc(a.word.word)}</td>
        <td>${esc(quizState.mode === 'en2jp' ? a.word.meaning_ja : a.word.word)}</td>
        <td style="color:#f44336;">${esc(a.chosen)}</td>
      </tr>`).join('')}</tbody></table></div>`;
  }

  result.innerHTML = `
    <div class="card">
      <div class="result-score">${correct} / ${total}</div>
      <div class="result-pct">${pct}%</div>
      <div style="text-align:center;margin-top:16px;">
        <button class="btn btn-primary" onclick="renderQuizConfig()">もう一度</button>
        ${wrong.length > 0 ? `<button class="btn btn-danger" onclick="retryWrong()">苦手だけ復習</button>` : ''}
      </div>
    </div>
    ${wrongHTML}
  `;
}

function retryWrong() {
  const wrong = quizState.answers.filter(a => !a.correct).map(a => a.word);
  if (wrong.length < 4) {
    // Pad with random words from the original quiz
    const extras = quizState.questions.filter(q => !wrong.find(w => w.id === q.id));
    while (wrong.length < 4 && extras.length > 0) {
      wrong.push(extras.splice(Math.floor(Math.random() * extras.length), 1)[0]);
    }
  }
  startQuiz(wrong);
}

// ==================
// Tab 4: 学習履歴
// ==================
function renderHistoryTab() {
  const history = getHistory();
  const data = getData();
  const vocab = data.words || [];
  const attempts = history.attempts || [];

  const totalAttempts = attempts.length;
  const totalCorrect = attempts.filter(a => a.correct).length;
  const overallAcc = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;

  // Count sessions (group by gaps > 5 min)
  let sessions = 0;
  if (attempts.length > 0) {
    sessions = 1;
    const sorted = [...attempts].sort((a,b) => a.timestamp - b.timestamp);
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i].timestamp - sorted[i-1].timestamp > 300000) sessions++;
    }
  }

  document.getElementById('historyStats').innerHTML = `
    <div class="stat-box"><div class="num">${totalAttempts}</div><div class="label">総回答数</div></div>
    <div class="stat-box"><div class="num">${overallAcc}%</div><div class="label">正答率</div></div>
    <div class="stat-box"><div class="num">${sessions}</div><div class="label">セッション</div></div>
  `;

  // Weak words: words with at least 1 attempt, sorted by accuracy asc
  const wordMap = {};
  attempts.forEach(a => {
    if (!wordMap[a.wordId]) wordMap[a.wordId] = { total: 0, correct: 0, last: 0 };
    wordMap[a.wordId].total++;
    if (a.correct) wordMap[a.wordId].correct++;
    wordMap[a.wordId].last = Math.max(wordMap[a.wordId].last, a.timestamp);
  });

  const weakWords = Object.entries(wordMap)
    .map(([id, s]) => ({ id, ...s, acc: s.total > 0 ? s.correct / s.total : 0 }))
    .filter(w => w.acc < 1)
    .sort((a,b) => a.acc - b.acc);

  const tbody = document.getElementById('weakTableBody');
  if (weakWords.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:20px;">苦手単語はありません</td></tr>';
    return;
  }

  tbody.innerHTML = weakWords.map(w => {
    const word = vocab.find(v => v.id === w.id);
    const dateStr = new Date(w.last).toLocaleDateString('ja-JP');
    return `<tr>
      <td>${word ? esc(word.word) : w.id}</td>
      <td>${word ? esc(word.meaning_ja||'') : ''}</td>
      <td>${w.total}</td>
      <td>${Math.round(w.acc * 100)}%</td>
      <td style="font-size:11px;">${dateStr}</td>
    </tr>`;
  }).join('');
}

function startWeakQuiz() {
  const history = getHistory();
  const data = getData();
  const vocab = data.words || [];
  const attempts = history.attempts || [];

  const wordMap = {};
  attempts.forEach(a => {
    if (!wordMap[a.wordId]) wordMap[a.wordId] = { total: 0, correct: 0 };
    wordMap[a.wordId].total++;
    if (a.correct) wordMap[a.wordId].correct++;
  });

  const weakIds = Object.entries(wordMap)
    .filter(([id, s]) => s.correct / s.total < 1)
    .sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total))
    .map(([id]) => id);

  const weakWords = weakIds.map(id => vocab.find(w => w.id === id)).filter(Boolean);

  if (weakWords.length === 0) {
    alert('苦手単語がありません');
    return;
  }

  // Switch to quiz tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-tab="quiz"]').classList.add('active');
  document.getElementById('tab-quiz').classList.add('active');

  if (weakWords.length < 4) {
    // Pad
    const extras = vocab.filter(v => !weakWords.find(w => w.id === v.id));
    while (weakWords.length < 4 && extras.length > 0) {
      weakWords.push(extras.splice(Math.floor(Math.random() * extras.length), 1)[0]);
    }
  }

  if (weakWords.length < 4) {
    alert('クイズには4単語以上必要です');
    return;
  }

  startQuiz(weakWords);
}

// === Auto-load vocab_data.json (GitHub Pages) ===
async function autoLoadData() {
  try {
    const res = await fetch('vocab_data.json?t=' + Date.now());
    if (!res.ok) return;
    const imported = await res.json();
    if (imported.words && imported.words.length > 0) {
      mergeData(imported);
      console.log('Auto-loaded vocab_data.json:', imported.words.length, 'words');
    }
  } catch(e) {
    // file:// or no file - ignore silently
  }
  renderDataTab();
  populateFilterDropdowns();
}

// === Init ===
autoLoadData();
